<!DOCTYPE html>

<head>

            </div>

    <main>
        <section class="content-section">
            <h2>LE PIAZZE</h2>
            <div class="carousel">
                <button class="arrow">&#10094;</button>

        <div class="divider"></div>

                <div class="card-container">
                    <div class="card">

                    <div class="card">

            <div class="social-links">

                    </i>
                    <i class="fab fa-twitter">
                        <img src="img/immagine 9.png" alt="fa-twitter" style="width: 100px;">
                    </i>
                    <i class="fab fa-facebook">
                        <img src="img/immagine 10.png" alt="fa-facebook" style="width: 49px;">
